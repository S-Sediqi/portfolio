<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #08111f;
      --surface: #101e30;
      --border:  #1e3348;
      --text:    #e4edf6;
      --muted:   #7a96b0;
      --teal:    #14b8a6;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(30,51,72,0.35) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30,51,72,0.35) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(180deg, rgba(0,0,0,0.5), rgba(0,0,0,0.05) 70%, transparent);
    }
    body::after {
      content: '';
      position: fixed;
      top: -150px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(20,184,166,0.07), transparent 70%);
      pointer-events: none;
    }
    .wrapper {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }
    .logo-mark {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      animation: float 4s ease-in-out infinite;
    }
    .logo-mark::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 18px;
      padding: 1px;
      background: linear-gradient(135deg, var(--teal), transparent 60%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.6;
    }
    .logo-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--teal);
      box-shadow: 0 0 16px rgba(20,184,166,0.6);
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-6px); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 16px rgba(20,184,166,0.6); }
      50%       { opacity: 0.6; box-shadow: 0 0 6px rgba(20,184,166,0.3); }
    }
    .headline {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.1;
      color: var(--text);
    }
    .headline span { color: var(--teal); }
    .subline {
      font-size: 1rem;
      font-weight: 300;
      color: var(--muted);
      max-width: 36ch;
      line-height: 1.7;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.45rem 1rem;
      letter-spacing: 0.05em;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--teal);
      animation: pulse 2.5s ease-in-out infinite;
    }
    .progress-wrap {
      width: 200px;
      height: 2px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--teal), rgba(20,184,166,0.4));
      border-radius: 999px;
      animation: progress 3s ease-out forwards;
      animation-delay: 0.5s;
    }
    @keyframes progress { to { width: 65%; } }
    .wrapper > * {
      opacity: 0;
      transform: translateY(12px);
      animation: enter 0.6s ease forwards;
    }
    .wrapper > *:nth-child(1) { animation-delay: 0.1s; }
    .wrapper > *:nth-child(2) { animation-delay: 0.2s; }
    .wrapper > *:nth-child(3) { animation-delay: 0.3s; }
    .wrapper > *:nth-child(4) { animation-delay: 0.4s; }
    .wrapper > *:nth-child(5) { animation-delay: 0.5s; }
    @keyframes enter { to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="logo-mark">
      <div class="logo-dot"></div>
    </div>
    <h1 class="headline">Something is<br>coming<span>.</span></h1>
    <p class="subline">A portfolio built with real projects, modern tools, and a lot of late nights. Almost ready.</p>
    <div class="status">
      <span class="status-dot"></span>
      Under active development
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"></div>
    </div>
  </div>
</body>
</html>
